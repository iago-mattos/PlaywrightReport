name: Verificação

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Node 24 LTS, Playwright e PDF
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PROGNUM_REPORT_PYTHON: python

    steps:
      - name: Baixar o código
        uses: actions/checkout@v6

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4

      - name: Configurar Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências Python
        run: python -m pip install reportlab==4.4.9 Pillow==12.2.0 pypdf==6.10.0

      - name: Instalar dependências Node.js
        run: pnpm install --frozen-lockfile

      - name: Instalar Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Executar homologação completa
        run: pnpm verify
